<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSM STORE - 180 Boulevard National</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020202; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-custom {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-pulse-custom { animation: pulse-custom 2s infinite; }
    </style>
</head>
<body class="text-white pb-44">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-lg border-b border-white/5 shadow-2xl">
        <div class="max-w-2xl mx-auto p-6 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-3xl font-black italic text-cyan-400 tracking-tighter uppercase leading-none">GSM STORE</h1>
                <p class="text-[10px] font-bold opacity-50 uppercase tracking-[0.4em] mt-2 italic">180 BD National, 13003</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-black text-green-500 uppercase italic tracking-widest block">OUVERT</span>
                <span class="text-[8px] opacity-30 font-bold uppercase tracking-widest italic">Marseille</span>
            </div>
        </div>
    </header>

    <!-- NAVIGATION TABS -->
    <div class="max-w-2xl mx-auto p-4 flex gap-4 mt-2">
        <button id="tab-phones" onclick="switchTab('PHONES')" class="flex-1 py-5 rounded-[2.5rem] font-black italic text-[11px] uppercase tracking-[0.2em] transition-all border bg-white text-black border-white shadow-xl scale-[1.02]">
            Catalogue
        </button>
        <button id="tab-repair" onclick="switchTab('REPAIR')" class="flex-1 py-5 rounded-[2.5rem] font-black italic text-[11px] uppercase tracking-[0.2em] transition-all border bg-zinc-950 text-white/40 border-white/5">
            Réparation
        </button>
    </div>

    <!-- SECTION CATALOGUE -->
    <div id="section-phones" class="block">
        <nav class="p-4 flex gap-2 overflow-x-auto no-scrollbar max-w-2xl mx-auto">
            <button onclick="filterBrand('TOUS')" class="brand-btn px-7 py-3.5 rounded-2xl text-[10px] font-black uppercase italic border transition-all shrink-0 bg-cyan-500 text-black border-cyan-500">TOUS</button>
            <button onclick="filterBrand('SAMSUNG')" class="brand-btn px-7 py-3.5 rounded-2xl text-[10px] font-black uppercase italic border transition-all shrink-0 bg-zinc-900/50 text-white/40 border-white/5">SAMSUNG</button>
            <button onclick="filterBrand('XIAOMI')" class="brand-btn px-7 py-3.5 rounded-2xl text-[10px] font-black uppercase italic border transition-all shrink-0 bg-zinc-900/50 text-white/40 border-white/5">XIAOMI</button>
            <button onclick="filterBrand('HONOR')" class="brand-btn px-7 py-3.5 rounded-2xl text-[10px] font-black uppercase italic border transition-all shrink-0 bg-zinc-900/50 text-white/40 border-white/5">HONOR</button>
        </nav>

        <main id="product-list" class="p-4 max-w-2xl mx-auto space-y-4">
            <!-- Produits générés par JS -->
        </main>
    </div>

    <!-- SECTION REPARATION -->
    <div id="section-repair" class="hidden">
        <main class="p-4 max-w-2xl mx-auto space-y-6">
            <div class="bg-zinc-900/60 border border-cyan-500/20 p-10 rounded-[3.5rem] text-center shadow-2xl">
                <h3 class="text-3xl font-black italic uppercase tracking-tighter leading-none">Toutes Pannes</h3>
                <p class="text-cyan-400 text-[11px] font-black uppercase mt-3 tracking-[0.4em] italic">Écran • Batterie • Micro-Soudure</p>
                
                <div class="mt-12">
                    <a href="tel:0758363736" class="block w-full py-5 bg-white text-black rounded-[2rem] font-black italic uppercase text-xs tracking-[0.2em] shadow-xl active:scale-95 transition-all">
                        Appeler pour un prix
                    </a>
                </div>
            </div>

            <div class="space-y-8 pb-10">
                <div>
                    <h4 class="text-[10px] font-black uppercase tracking-[0.4em] text-cyan-400 italic ml-6 mb-4">NOS EXPERTISES</h4>
                    <div class="grid gap-3" id="repair-list">
                        <!-- Expertises générées par JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- FOOTER FIXE -->
    <footer class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black via-black/95 to-transparent z-[80]">
        <div class="max-w-md mx-auto">
            <a href="tel:0758363736" class="flex items-center justify-between bg-white text-black h-20 px-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(255,255,255,0.1)] active:scale-95 transition-all group">
                <div class="flex flex-col items-start leading-none">
                    <p class="text-[9px] font-black uppercase tracking-[0.3em] opacity-30 mb-1 italic">CONTACT STORE</p>
                    <p class="text-2xl font-black italic uppercase tracking-tighter leading-none">07 58 36 37 36</p>
                </div>
                <div class="bg-cyan-500 text-black p-4 rounded-2xl animate-pulse-custom">
                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z" /></svg>
                </div>
            </a>
        </div>
    </footer>

    <script>
        const products = [
            { id: 1, name: "Samsung Galaxy S25", price: "579€", brand: "SAMSUNG", promo: true },
            { id: 2, name: "Samsung Galaxy S24 Ultra", price: "689€", brand: "SAMSUNG", promo: false },
            { id: 3, name: "Samsung Galaxy S24 FE", price: "389€", brand: "SAMSUNG", promo: true },
            { id: 4, name: "Redmi Note 13 Pro 5G", price: "259€", brand: "XIAOMI", promo: false },
            { id: 5, name: "Honor 200 Lite", price: "199€", brand: "HONOR", promo: true }
        ];

        const repairs = [
            { name: "Écrans & Vitres", desc: "Toutes marques - Pose express" },
            { name: "Batteries", desc: "Redonnez vie à votre mobile" },
            { name: "Micro-Soudure", desc: "Expertise carte mère" },
            { name: "Déblocage Compte", desc: "iCloud, Google, MDP" },
            { name: "Désoxydation", desc: "Tombé dans l'eau ?" }
        ];

        function switchTab(tab) {
            const btnPhones = document.getElementById('tab-phones');
            const btnRepair = document.getElementById('tab-repair');
            const secPhones = document.getElementById('section-phones');
            const secRepair = document.getElementById('section-repair');

            if (tab === 'PHONES') {
                btnPhones.className = "flex-1 py-5 rounded-[2.5rem] font-black italic text-[11px] uppercase tracking-[0.2em] transition-all border bg-white text-black border-white shadow-xl scale-[1.02]";
                btnRepair.className = "flex-1 py-5 rounded-[2.5rem] font-black italic text-[11px] uppercase tracking-[0.2em] transition-all border bg-zinc-950 text-white/40 border-white/5";
                secPhones.classList.remove('hidden');
                secRepair.classList.add('hidden');
            } else {
                btnRepair.className = "flex-1 py-5 rounded-[2.5rem] font-black italic text-[11px] uppercase tracking-[0.2em] transition-all border bg-cyan-500 text-black border-cyan-500 shadow-xl scale-[1.02]";
                btnPhones.className = "flex-1 py-5 rounded-[2.5rem] font-black italic text-[11px] uppercase tracking-[0.2em] transition-all border bg-zinc-950 text-white/40 border-white/5";
                secPhones.classList.add('hidden');
                secRepair.classList.remove('hidden');
            }
        }

        function filterBrand(brand) {
            const btns = document.querySelectorAll('.brand-btn');
            btns.forEach(btn => {
                if (btn.innerText === brand) {
                    btn.className = "brand-btn px-7 py-3.5 rounded-2xl text-[10px] font-black uppercase italic border transition-all shrink-0 bg-cyan-500 text-black border-cyan-500 shadow-md shadow-cyan-500/30";
                } else {
                    btn.className = "brand-btn px-7 py-3.5 rounded-2xl text-[10px] font-black uppercase italic border transition-all shrink-0 bg-zinc-900/50 text-white/40 border-white/5";
                }
            });
            renderProducts(brand);
        }

        function renderProducts(brand = 'TOUS') {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            const filtered = brand === 'TOUS' ? products : products.filter(p => p.brand === brand);
            
            filtered.forEach(p => {
                list.innerHTML += `
                    <div onclick="window.location.href='tel:0758363736'" class="bg-zinc-900/40 border border-white/5 p-7 rounded-[2.5rem] flex justify-between items-center transition-all hover:bg-zinc-800/60 active:scale-[0.98] cursor-pointer">
                        <div class="flex items-center gap-6">
                            <div class="w-1.5 h-12 rounded-full ${p.promo ? 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.3)]' : 'bg-cyan-500'}"></div>
                            <div>
                                <span class="text-[8px] font-black text-cyan-400/60 uppercase tracking-[0.3em] italic">${p.brand}</span>
                                <h2 class="text-xl font-black uppercase italic tracking-tighter text-white leading-none mt-1">${p.name}</h2>
                                <p class="text-[9px] font-bold opacity-30 uppercase mt-2 italic">Garantie 6 mois</p>
                            </div>
                        </div>
                        <div class="text-right font-black italic tracking-tighter text-3xl">${p.price}</div>
                    </div>
                `;
            });
        }

        function renderRepairs() {
            const list = document.getElementById('repair-list');
            repairs.forEach(r => {
                list.innerHTML += `
                    <div class="bg-zinc-900/30 border border-white/5 p-6 rounded-[2.5rem] flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="font-black italic uppercase text-sm tracking-tight">${r.name}</span>
                            <span class="text-[9px] opacity-40 uppercase font-bold mt-1 tracking-wider">${r.desc}</span>
                        </div>
                        <a href="tel:0758363736" class="flex items-center gap-2 bg-white/5 px-4 py-2.5 rounded-2xl border border-white/10 active:scale-95 transition-all">
                            <span class="text-white font-black italic text-[8px] uppercase tracking-widest">DEVIS</span>
                            <svg class="w-3 h-3 text-cyan-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z" /></svg>
                        </a>
                    </div>
                `;
            });
        }

        window.onload = () => {
            renderProducts();
            renderRepairs();
        };
    </script>
</body>
</html>
